services:
  - type: web
    name: suivi-stagiaires
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: suivi-stagiaires-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: suivi-stagiaires-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: suivi-stagiaires-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: suivi-stagiaires-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: suivi-stagiaires-db
          property: password

databases:
  - name: suivi-stagiaires-db
    plan: free
    databaseName: suivi_stagiaires
